            },
            // 波色对应号码 (标准六合彩波色)
            waveColorMap: {
                "红波": [1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46],
                "蓝波": [3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48],
                "绿波": [5,6,11,16,17,21,22,27,28,32,33,38,39,43,44,49]
            },
            amountUnits: ['元','斤','米','块','￥'],
            filterWords: ['多少钱','多少米','总计','总共','合计','共','给我算算','帮我算算','帮算','计算','算一下','算算','请问','帮忙','看一下','看看'],
            betKeywords: ['各','各号','每','每号','每颗','颗','号'],
            numberRange: { min:1, max:49 }
        };

        // ==================== 彩票解析器 ====================
        class LotteryBetParser {
            constructor(config = LOTTERY_CONFIG) { this.config = config; }
            
            parseInput(input) {
                if (!input || typeof input !== 'string') return [];
                const cleaned = input.trim().replace(/^一共[：:]*\s*/, '').replace(/斤|米|块|￥/g, '元');
                const items = this._extractBetItems(cleaned);
                const allBets = [];
                items.forEach(item => { const bets = this._parseSingleItem(item.content, item.amount); allBets.push(...bets); });
                return allBets;
            }
            
            _extractBetItems(text) {
                const items = [];
                const regex = /([^,]+?各号\s*\d+(?:\.\d+)?\s*元)/g;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    const fullText = match[0];
                    const amountMatch = fullText.match(/各号\s*(\d+(?:\.\d+)?)\s*元/);
                    if (amountMatch) items.push({ content: fullText.substring(0, amountMatch.index).trim(), amount: parseFloat(amountMatch[1]) });
                }
                return items;
            }
            
            _parseSingleItem(content, amount) {
                const bets = [];
                const cleanContent = content.replace(/\s+/g, '');
                const zodiacCounts = this._countOccurrences(cleanContent, Object.keys(this.config.zodiacMap));
                const waveCounts = this._countOccurrences(cleanContent, Object.keys(this.config.waveColorMap));
                const numbers = this._extractNumbers(cleanContent);
                
                Object.entries(zodiacCounts).forEach(([zodiac, count]) => {
                    this.config.zodiacMap[zodiac].forEach(num => { for(let i=0;i<count;i++) bets.push({ number: num, amount }); });
                });
                Object.entries(waveCounts).forEach(([wave, count]) => {
                    this.config.waveColorMap[wave].forEach(num => { for(let i=0;i<count;i++) bets.push({ number: num, amount }); });
                });
                numbers.forEach(num => bets.push({ number: num, amount }));
                return bets;
            }
            
            _countOccurrences(text, keywords) {
                const counts = {};
                keywords.forEach(keyword => {
                    let count = 0, pos = 0;
                    while ((pos = text.indexOf(keyword, pos)) !== -1) { count++; pos += keyword.length; }
                    if (count > 0) counts[keyword] = count;
                });
                return counts;
            }
            
            _extractNumbers(text) {
                const numbers = [];
                const numberPattern = /\b(0?[1-9]|[12][0-9]|3[0-9]|4[0-9])\b/g;
                const matches = text.match(numberPattern) || [];
                matches.forEach(match => {
                    const num = parseInt(match.replace(/^0+/, ''), 10);
                    if (num >= 1 && num <= 49) numbers.push(num);
                });
                return numbers;
            }
            
            findZodiac(number) { for (const [zodiac, numbers] of Object.entries(this.config.zodiacMap)) if (numbers.includes(number)) return zodiac; return null; }
            findWaveColor(number) { for (const [wave, numbers] of Object.entries(this.config.waveColorMap)) if (numbers.includes(number)) return wave; return null; }
        }

                });
                
                let html = '', currentRank = 0;
                sortedData.forEach((item) => {

            function addHistoryRecord(text, count, amount) {

            function renderHistory() {

                // 重建 moneyMap

                window.historyRecords.forEach(record => {
                    lotteryParser.parseInput(record.text).forEach(bet => {
                        if (bet.number >= 1 && bet.number <= 49) window.moneyMap[bet.number] = (window.moneyMap[bet.number] || 0) + bet.amount;

                renderHistory(); renderDataTable(); updateTotalAmount(); saveData();
                if (window.firebaseDb) saveToCloud();

            function saveCurrentStateForUndo() {
                window.undoStack.push({ moneyMap: {...window.moneyMap}, historyRecords: JSON.parse(JSON.stringify(window.historyRecords)), timestamp: Date.now() });
                if (window.undoStack.length > 20) window.undoStack.shift();

                bets.forEach(bet => { if (bet.number >= 1 && bet.number <= 49) window.moneyMap[bet.number] = (window.moneyMap[bet.number] || 0) + bet.amount; });
                window.lotteryData.forEach(item => { item.amount = window.moneyMap[item.number] || 0; });
                const totalAmount = bets.reduce((sum, bet) => sum + bet.amount, 0);
                addHistoryRecord(input, bets.length, totalAmount);

            document.getElementById('networkIndicator').className = 'network-indicator network-offline';
            showNotification('⚠️ 网络已断开，切换到离线模式');
            updateCloudStatus('离线模式', 'offline');
        });
        document.getElementById('networkIndicator').className = navigator.onLine ? 'network-indicator network-online' : 'network-indicator network-offline';
